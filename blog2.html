<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Blog</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f4f4;
        }

        /* Header */
        header {
            background: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Container */
        .container {
            width: 90%;
            max-width: 800px;
            margin: 20px auto;
        }

        /* Form */
        .form-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .form-box input,
        .form-box textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .form-box button {
            padding: 10px;
            width: 100%;
            background: #222;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        /* Posts */
        .post {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .post h3 {
            margin: 0;
        }

        .post small {
            color: gray;
        }

        .actions {
            margin-top: 10px;
        }

        .actions button {
            margin-right: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <header>
        <h1>Community Blog</h1>
        <p>Share your experience & opinions</p>
    </header>

    <div class="container">

        <!-- Input Form -->
        <div class="form-box">
            <input type="text" id="name" placeholder="Your name">
            <textarea id="content" placeholder="Write your experience..."></textarea>
            <button onclick="addPost()">Post</button>
        </div>

        <!-- Posts Area -->
        <div id="posts"></div>

    </div>

    <script>
        let posts = [];

        // Load posts when page opens
        function loadPosts() {
            const saved = localStorage.getItem("posts");
            if (saved) {
                posts = JSON.parse(saved);
            }
            renderPosts();
        }

        // Save posts
        function savePosts() {
            localStorage.setItem("posts", JSON.stringify(posts));
        }

        // Display posts
        function renderPosts() {
            const postsDiv = document.getElementById("posts");
            postsDiv.innerHTML = "";

            posts.forEach((post, index) => {
                postsDiv.innerHTML += `
            <div class="post">
                <h3>${post.name}</h3>
                <small>${post.date}</small>
                <p>${post.content}</p>
                <div class="actions">
                    <button onclick="likePost(${index})">👍 ${post.likes}</button>
                    <button onclick="deletePost(${index})">🗑️ Delete</button>
                </div>
            </div>
        `;
            });
        }

        // Add post
        function addPost() {
            const name = document.getElementById("name").value.trim();
            const content = document.getElementById("content").value.trim();

            if (!name || !content) {
                alert("Please fill all fields");
                return;
            }

            const newPost = {
                name: name,
                content: content,
                likes: 0,
                date: new Date().toLocaleString()
            };

            posts.unshift(newPost);
            savePosts();
            renderPosts();

            document.getElementById("name").value = "";
            document.getElementById("content").value = "";
        }

        // Like post
        function likePost(index) {
            posts[index].likes++;
            savePosts();
            renderPosts();
        }

        // Delete post
        function deletePost(index) {
            posts.splice(index, 1);
            savePosts();
            renderPosts();
        }

        // Run on page load
        window.onload = loadPosts;
    </script>

</body>

</html>
